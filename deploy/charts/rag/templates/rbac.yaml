# ServiceAccounts
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-gateway-sa
  namespace: api-gateway
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: query-service-sa
  namespace: query
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: reranker-sa
  namespace: reranker
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ingestion-worker-sa
  namespace: ingestion
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: es-sa
  namespace: retrieval-deps
# Roles
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: query-service-role
  namespace: query
rules:
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ingestion-worker-role
  namespace: ingestion
rules:
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: api-gateway-role
  namespace: api-gateway
rules:
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "list"]
# RoleBindings
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: query-service-rb
  namespace: query
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: query-service-role
subjects:
  - kind: ServiceAccount
    name: query-service-sa
    namespace: query
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ingestion-worker-rb
  namespace: ingestion
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ingestion-worker-role
subjects:
  - kind: ServiceAccount
    name: ingestion-worker-sa
    namespace: ingestion
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: api-gateway-rb
  namespace: api-gateway
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: api-gateway-role
subjects:
  - kind: ServiceAccount
    name: api-gateway-sa
    namespace: api-gateway
