{{- range $key, $svc := .Values.services }}
{{- if and $svc.secret $svc.secret.create }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $svc.secretName }}
  namespace: {{ $svc.namespace }}
  labels:
{{ include "rag.serviceLabels" (dict "root" $ "component" $key "app" $svc.name) | indent 4 }}
type: Opaque
stringData:
{{- range $envName, $envValue := $svc.secret.stringData }}
  {{ $envName }}: {{ $envValue | quote }}
{{- end }}
{{- end }}
{{- end }}
{{- range $key, $secret := .Values.externalSecrets }}
{{- if $secret.create }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secret.name }}
  namespace: {{ $secret.namespace }}
  labels:
{{ include "rag.labels" $ | indent 4 }}
type: {{ default "Opaque" $secret.type }}
stringData:
{{- range $envName, $envValue := $secret.stringData }}
  {{ $envName }}: {{ $envValue | quote }}
{{- end }}
{{- end }}
{{- end }}
