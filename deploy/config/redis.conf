maxmemory 3gb
maxmemory-policy allkeys-lru

appendonly yes
appendfsync everysec

save 900 1
save 300 10

bind 0.0.0.0

# Password injected from K8s Secret at runtime via REDIS_PASSWORD env var
# requirepass ${REDIS_PASSWORD}

# DB layout:
#   DB 0 — ACL auth cache       key: acl:{claims_hash}             TTL: 300s
#   DB 1 — Query Guard state    key: guard_rl:{uid}, guard_hist:{uid}  TTL: 60–300s
#   DB 2 — Query result cache   key: result:{query_hash}:{acl_key} TTL: 60s
#   DB 3 — Embedding cache      key: emb:{model_id}:{text_hash}    TTL: 3600s
